<!DOCTYPE html>
<html lang="ca">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>El fenomen del pàdel | Contacte</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body id="top" class="bg-light page-contact">
  <header class="site-header shadow-sm sticky-top">
    <div class="header-inner">
      <div class="brand"><a href="index.html">El fenomen del pàdel</a></div>
      <nav class="site-nav">
        <button class="nav-toggle" aria-label="Obrir menú">☰</button>
        <ul>
          <li><a href="index.html">Inici</a></li>
          <li><a href="info.html">Informació</a></li>
          <li><a href="multimedia.html">Multimèdia</a></li>
          <li><a href="mapa.html">Mapa</a></li>
          <li><a href="contacte.html" class="active">Contacte</a></li>
        </ul>
      </nav>
    </div>
  </header>

  <main class="contact-grid container-fluid py-4">
    <section class="card shadow-sm rounded-4 contact-copy">
      <span class="badge text-bg-success mb-3">Formulari</span>
      <h1>Contacte</h1>
      <p>Si vols enviar comentaris, suggeriments o opinions sobre aquesta web dedicada al pàdel, pots fer-ho a través del formulari següent.</p>
    </section>

    <section class="card shadow-sm rounded-4 form-card">
      <form class="contact-form needs-validation" novalidate>
        <label class="form-label" for="nom">Nom</label>
        <input class="form-control" type="text" id="nom" name="nom" placeholder="Escriu el teu nom">

        <label class="form-label" for="correu">Correu electrònic</label>
        <input class="form-control" type="email" id="correu" name="correu" placeholder="exemple@correu.com">

        <label class="form-label" for="missatge">Missatge</label>
        <textarea class="form-control" id="missatge" name="missatge" rows="6" placeholder="Escriu el teu missatge"></textarea>

        <button type="submit" class="button btn btn-success">Enviar</button>
      </form>
    </section>
  </main>

  <footer class="site-footer">
    <div class="footer-inner">
      <p class="footer-brand">El fenomen del pàdel</p>
      <div class="footer-links">
        <a href="#top">Tornar a l'inici</a>
        <a href="https://www.instagram.com/" target="_blank" rel="noopener noreferrer">Instagram</a>
        <a href="https://www.youtube.com/" target="_blank" rel="noopener noreferrer">YouTube</a>
      </div>
    </div>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/script.js"></script>
</body>
</html>
